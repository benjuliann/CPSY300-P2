name: CI/CD Pipeline Simulation

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '25.x'

      - name: Install dependencies
        run: npm install

      - name: Build Docker image
        run: docker build -t my-app:latest .